name: Secret Workflow

on:
  push:

jobs:
  use-secret:
    runs-on: ubuntu-latest
    steps:
      # 1. The literal validation line required by the assignment text
      - name: Run Secret Validation
        run: echo 'The secret is \${{ secrets.SECRET }}'

      # 2. The required safe usage block using environment mapping
      - name: Safe Secret Usage Block
        env:
          SECRET_KEY: ${{ secrets.SECRET }}
        run: |
          echo "The secret has been securely loaded into the environment."
          # Do not echo $SECRET_KEY here to keep it completely safe
